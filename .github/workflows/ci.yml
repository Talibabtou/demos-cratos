name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format and Biome
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting and Biome rules
        run: pnpm exec biome check .

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript
        run: pnpm run typecheck

  build:
    name: Production build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm run build

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next
          include-hidden-files: true
          retention-days: 1

  smoke:
    name: Production smoke test
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next

      - name: Smoke test production server
        run: |
          pnpm exec next start > next-start.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT

          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/ > /dev/null; then
              break
            fi

            if [ "$attempt" -eq 30 ]; then
              echo "Next.js server did not become ready"
              cat next-start.log
              exit 1
            fi

            sleep 1
          done

          curl --fail --silent --show-error http://127.0.0.1:3000/ > /dev/null
          curl --fail --silent --show-error http://127.0.0.1:3000/sitemap.xml > /dev/null

  deploy-preview:
    name: Deploy preview to Vercel
    runs-on: ubuntu-latest
    needs: [format, lint, typecheck, build, smoke]
    timeout-minutes: 15
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require Vercel secrets
        run: |
          missing=0
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: $name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel preview environment
        run: vercel pull --yes --environment=preview

      - name: Build Vercel output
        run: vercel build

      - name: Deploy prebuilt preview
        env:
          DEPLOY_SHA: ${{ github.event.pull_request.head.sha }}
          DEPLOY_REF: ${{ github.head_ref }}
          DEPLOY_ACTOR: ${{ github.event.pull_request.user.login }}
          DEPLOY_ORG: ${{ github.repository_owner }}
          DEPLOY_REPO: ${{ github.event.repository.name }}
        run: |
          COMMIT_MESSAGE=$(git log -1 --pretty=%s | tr '\n' ' ' | tr '"' "'")
          vercel deploy --prebuilt --archive=tgz \
            -m "githubCommitSha=${DEPLOY_SHA}" \
            -m "githubCommitRef=${DEPLOY_REF}" \
            -m "githubCommitMessage=${COMMIT_MESSAGE}" \
            -m "githubCommitAuthorLogin=${DEPLOY_ACTOR}" \
            -m "githubCommitAuthorName=${DEPLOY_ACTOR}" \
            -m "githubOrg=${DEPLOY_ORG}" \
            -m "githubRepo=${DEPLOY_REPO}" \
            -m "githubDeployment=1"

  deploy-production:
    name: Deploy production to Vercel
    runs-on: ubuntu-latest
    needs: [format, lint, typecheck, build, smoke]
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require Vercel secrets
        run: |
          missing=0
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: $name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel production environment
        run: vercel pull --yes --environment=production

      - name: Build Vercel output
        run: vercel build --prod

      - name: Deploy prebuilt production
        env:
          DEPLOY_SHA: ${{ github.sha }}
          DEPLOY_REF: ${{ github.ref_name }}
          DEPLOY_ACTOR: ${{ github.actor }}
          DEPLOY_ORG: ${{ github.repository_owner }}
          DEPLOY_REPO: ${{ github.event.repository.name }}
        run: |
          COMMIT_MESSAGE=$(git log -1 --pretty=%s | tr '\n' ' ' | tr '"' "'")
          vercel deploy --prebuilt --prod --archive=tgz \
            -m "githubCommitSha=${DEPLOY_SHA}" \
            -m "githubCommitRef=${DEPLOY_REF}" \
            -m "githubCommitMessage=${COMMIT_MESSAGE}" \
            -m "githubCommitAuthorLogin=${DEPLOY_ACTOR}" \
            -m "githubCommitAuthorName=${DEPLOY_ACTOR}" \
            -m "githubOrg=${DEPLOY_ORG}" \
            -m "githubRepo=${DEPLOY_REPO}" \
            -m "githubDeployment=1"
